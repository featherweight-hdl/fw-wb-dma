# yaml-language-server: $schema=https://dv-flow.github.io/flow.dv.schema.json
fragment:
  # UVM + fw-hdl environment for the SPL class model. The UVM register agent
  # drives the engine through the protocol-independent std_mem_if BFM; scenarios
  # mirror packages/wb_dma/bench (sw_dma / arb_test / hw_dma, Phase-1 subset).
  #
  # Requires UVM_HOME=$IVPM_PACKAGES/uvm (the uvm package ships no envrc;
  # hdlsim.vlt.SimLibUVM locates UVM via $UVM_HOME).
  tasks:
  - name: uvm-env-src
    uses: std.FileSet
    needs: [spl]
    with:
      type: systemVerilogSource
      base: env
      incdirs: ["."]
      include:
      - wb_dma_model_pkg.sv
      - wb_dma_uvm_pkg.sv

  - name: uvm-test-src
    uses: std.FileSet
    needs: [uvm-env-src]
    with:
      type: systemVerilogSource
      base: tests
      incdirs: ["."]
      include:
      - wb_dma_tests_pkg.sv

  - name: uvm-tb-src
    uses: std.FileSet
    needs: [uvm-test-src]
    with:
      type: systemVerilogSource
      base: tb
      incdirs: ["."]
      include: [hvl_top_spl.sv]

  - name: uvm-img
    uses: hdlsim.vlt.SimImage
    needs: [spl, hdlsim.vlt.SimLibUVM, uvm-tb-src]
    with:
      top: [hvl_top_spl]

  # ---- Signal-level (Wishbone) UVM path: same env+tests, wb_dma_spl DUT --------
  # The WB model pkg brings in the wrapper + Wishbone kit (via spl-wb) on top of
  # the shared env sources.
  - name: uvm-wb-env-src
    uses: std.FileSet
    needs: [uvm-env-src, spl-wb, org.fwvip.gpio.vip-uvm-hvlsrc]
    with:
      type: systemVerilogSource
      base: env
      incdirs: ["."]
      include:
      - wb_dma_wb_model_pkg.sv

  - name: uvm-wb-tb-src
    uses: std.FileSet
    needs: [uvm-test-src, uvm-wb-env-src]
    with:
      type: systemVerilogSource
      base: tb
      incdirs: ["."]
      include: [hvl_top_spl_wb.sv]

  - name: uvm-wb-img
    uses: hdlsim.vlt.SimImage
    needs: [spl-wb, hdlsim.vlt.SimLibUVM, org.fwvip.gpio.vip-uvm-hvlsrc, uvm-wb-tb-src]
    with:
      top: [hvl_top_spl_wb]

  - root: uvm-wb-smoke
    uses: hdlsim.vlt.SimRun
    needs: [uvm-wb-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_sw_copy_test

  - root: uvm-wb-arb
    uses: hdlsim.vlt.SimRun
    needs: [uvm-wb-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_arb_test

  # ---- Signal-level (Wishbone) UVM path: same env+tests, wb_dma_top RTL DUT -----
  # Reuses the host register path + GPIO->int_changed seam from the WB model, but
  # backs the DUT's master (data) ports with combinational 0-wait-state SV RAMs
  # (wb_ram_slv) via wb_dma_rtl_model -- the wb_dma engine is proven against a
  # same-cycle memory, not a variable-latency transactor. The per-channel HS bus is
  # stubbed in hvl_top_rtl (tied off), so only sw_copy / arb run here. SimLibUVM
  # MUST precede the GPIO VIP (uvm base types first).
  - name: uvm-rtl-ram-src
    uses: std.FileSet
    with:
      type: systemVerilogSource
      base: tb
      include: [wb_ram_slv.sv]

  - name: uvm-rtl-env-src
    uses: std.FileSet
    needs: [uvm-wb-env-src, uvm-rtl-ram-src]
    with:
      type: systemVerilogSource
      base: env
      incdirs: ["."]
      include: [wb_dma_rtl_model_pkg.sv]

  - name: uvm-rtl-tb-src
    uses: std.FileSet
    needs: [uvm-test-src, uvm-rtl-env-src]
    with:
      type: systemVerilogSource
      base: tb
      incdirs: ["."]
      include: [hvl_top_rtl.sv]

  - name: uvm-rtl-img
    uses: hdlsim.vlt.SimImage
    needs: [rtl, spl-wb, hdlsim.vlt.SimLibUVM, org.fwvip.gpio.vip-uvm-hvlsrc, uvm-rtl-tb-src]
    with:
      top: [hvl_top_rtl]
      # The OpenCores RTL is Verilog-2001 (uses `int` as a port name, reserved in
      # SystemVerilog). Map the .v extension to Verilog-2001 so those files parse
      # as Verilog while the .sv env/transactors stay SystemVerilog.
      # --no-assert: the RTL's one-hot SMs carry `// synopsys parallel_case
      # full_case` synthesis pragmas that Verilator (unlike event sims) promotes
      # to runtime $stop; they trip on the all-zero t=0 state before the first
      # clocked reset load. Disable so Verilator matches standard-sim semantics.
      args: ["+1364-2001ext+v", "--no-assert"]

  - root: uvm-rtl-smoke
    uses: hdlsim.vlt.SimRun
    needs: [uvm-rtl-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_sw_copy_test

  - root: uvm-rtl-arb
    uses: hdlsim.vlt.SimRun
    needs: [uvm-rtl-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_arb_test

  # ---- throughput benchmark: same wb_dma_perf_test on all three DUT flavours ----
  # Wall-clock-bounded (runs >= PERF_SECS); +PERF disables the sim-time watchdog.
  # Reports xfers/s + Mword/s; the tops also print START/FINISH wall-clock.
  - root: uvm-perf
    uses: hdlsim.vlt.SimRun
    needs: [uvm-img]
    with:
      plusargs: [UVM_TESTNAME=wb_dma_perf_test, PERF, PERF_LABEL=TLM, PERF_SECS=5]

  - root: uvm-wb-perf
    uses: hdlsim.vlt.SimRun
    needs: [uvm-wb-img]
    with:
      plusargs: [UVM_TESTNAME=wb_dma_perf_test, PERF, PERF_LABEL=SPL_XTOR, PERF_SECS=5]

  - root: uvm-rtl-perf
    uses: hdlsim.vlt.SimRun
    needs: [uvm-rtl-img]
    with:
      plusargs: [UVM_TESTNAME=wb_dma_perf_test, PERF, PERF_LABEL=RTL, PERF_SECS=5]

  # One run task per scenario (same image, different +UVM_TESTNAME).
  - root: uvm-smoke
    uses: hdlsim.vlt.SimRun
    needs: [uvm-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_sw_copy_test

  - root: uvm-arb
    uses: hdlsim.vlt.SimRun
    needs: [uvm-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_arb_test

  - root: uvm-hwhs
    uses: hdlsim.vlt.SimRun
    needs: [uvm-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_hw_hs_test

  - root: uvm-hol
    uses: hdlsim.vlt.SimRun
    needs: [uvm-img]
    with:
      plusargs:
      - UVM_TESTNAME=wb_dma_hol_test
